name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo to run the gate.
permissions:
  contents: read

jobs:
  validate:
    name: validate-plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The validate gate has driver/ + cli/ check-groups that need node + pnpm;
      # without these they silently skip in CI. pnpm/action-setup must run BEFORE
      # setup-node so the cache wiring resolves to the pnpm we just installed.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Ensure jq is available
        run: sudo apt-get install -y jq || true

      - name: Run plugin validation
        run: bash tests/validate-plugin.sh

      - name: Run shift smoke test
        # End-to-end mechanics: setup-shift -> Stop-loop -> clock-out + gate.
        # bd isn't installed in CI, so this exercises the bd-independent path.
        run: bash tests/smoke-shift.sh

      - name: Run node --test (ported hooks)
        # White-box unit tests for the Node-ported hooks (the gate, today).
        # ubuntu-latest ships Node, so this always runs in CI.
        run: node --test hooks/*.test.mjs

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run shellcheck
        # Lint shift-crew shell entrypoints at warning severity. This job DOES gate the
        # workflow (no continue-on-error), so keep it green: fix the finding, or add a
        # scoped `# shellcheck disable=SCXXXX` with a reason rather than silencing broadly.
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          additional_files: 'hooks scripts'
        env:
          SHELLCHECK_OPTS: -e SC1091
